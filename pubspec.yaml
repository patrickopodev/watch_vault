name: streamvault
description: StreamVault - Sports, Movies & Live Streaming
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5

  # Routing
  go_router: ^14.0.0

  # Network
  dio: ^5.4.0
  connectivity_plus: ^6.0.0

  # Auth + DB
  supabase_flutter: ^2.3.0

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI
  cached_network_image: ^3.3.1
  lottie: ^3.0.0
  shimmer: ^3.0.0
  google_fonts: ^6.1.0

  # Video
  better_player: ^0.0.83
  video_player: ^2.8.2

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.2

  # DI
  get_it: ^7.6.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
